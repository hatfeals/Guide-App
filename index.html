<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Rehber El Kitabı</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .flashcard-container {
            width: 85%;
            max-width: 400px;
            height: 60vh;
            perspective: 1000px;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            background-color: #1E1E1E;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        .level-badge {
            color: #D4AF37;
            font-size: 14px;
            font-weight: bold;
            position: absolute;
            top: 25px;
            letter-spacing: 2px;
        }

        .word {
            font-size: 42px;
            font-weight: 800;
        }

        .translation {
            font-size: 32px;
            color: #D4AF37;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .sentence {
            font-size: 18px;
            font-style: italic;
            color: #CCCCCC;
            line-height: 1.5;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            width: 85%;
            max-width: 400px;
        }

        .btn {
            background-color: #D4AF37;
            color: #121212;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-audio {
            flex-grow: 0;
            width: 65px;
            font-size: 24px;
        }
        
        .hint {
            margin-top: 20px;
            font-size: 13px;
            color: #666;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="flashcard-container" id="cardContainer">
        <div class="flashcard" id="flashcard">
            <div class="card-face card-front">
                <div class="level-badge" id="levelFront">SEVİYE: A0</div>
                <div class="word" id="wordText">Loading...</div>
            </div>
            <div class="card-face card-back">
                <div class="level-badge" id="levelBack">SEVİYE: A0</div>
                <div class="translation" id="translationText">Yükleniyor...</div>
                <div class="sentence" id="sentenceText">"Loading..."</div>
            </div>
        </div>
    </div>
    
    <div class="hint">ÇEVİRİYİ GÖRMEK İÇİN KARTA DOKUN</div>

    <div class="controls">
        <button class="btn btn-audio" id="audioBtn">🔊</button>
        <button class="btn" id="nextBtn">Sonraki Kelime</button>
    </div>

    <script>

            { seviye: "B1", kelime: "Century", anlam: "Yüzyıl", cumle: "This structure was built in the early 14th century." },
            { seviye: "B2", kelime: "Excavation", anlam: "Kazı", cumle: "The ongoing excavation revealed artifacts from the Roman period." },
            { seviye: "C1", kelime: "Historian", anlam: "Tarihçi", cumle: "Herodotus is widely recognized as the first historian to systematically collect his materials." },

            { seviye: "C2", kelime: "Polytheism", anlam: "Çok Tanrıcılık", cumle: "Sumerian religion was heavily defined by polytheism, with distinct deities governing various aspects of nature." },
            { seviye: "C2", kelime: "Epic", anlam: "Destan", cumle: "The Epic of Gilgamesh offers profound insights into ancient Mesopotamian beliefs." }
        ];

        let currentIndex = 0;
        const flashcard = document.getElementById('flashcard');
        const cardContainer = document.getElementById('cardContainer');
        const nextBtn = document.getElementById('nextBtn');
        const audioBtn = document.getElementById('audioBtn');

        const levelFront = document.getElementById('levelFront');
        const levelBack = document.getElementById('levelBack');
        const wordText = document.getElementById('wordText');
        const translationText = document.getElementById('translationText');
        const sentenceText = document.getElementById('sentenceText');

        function loadCard(index) {
            const data = vocabulary[index];
            levelFront.innerText = "SEVİYE: " + data.seviye;
            levelBack.innerText = "SEVİYE: " + data.seviye;
            wordText.innerText = data.kelime;
            translationText.innerText = data.anlam;
            sentenceText.innerText = `"${data.cumle}"`;
        }

        // Kart Çevirme
        cardContainer.addEventListener('click', () => {
            flashcard.classList.toggle('is-flipped');
        });

        // Sonraki Kelime Geçişi ve Animasyon Kontrolü
        nextBtn.addEventListener('click', () => {
            currentIndex++;
            if (currentIndex >= vocabulary.length) {
                currentIndex = 0; 
            }
            
            if (flashcard.classList.contains('is-flipped')) {
                flashcard.classList.remove('is-flipped');
                setTimeout(() => {
                    loadCard(currentIndex);
                }, 300); // Kart kapanırken yazıyı değiştirir, göze batmaz.
            } else {
                 loadCard(currentIndex);
            }
        });
