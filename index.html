<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Rehber Asistanı</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { margin: 0; padding: 0; background-color: #121212; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .screen.active { display: flex; }

        .header { width: 100%; max-width: 400px; display: flex; align-items: center; padding: 20px 0; margin-bottom: 20px; position: relative; }
        .back-btn { background: none; border: none; color: #D4AF37; font-size: 16px; font-weight: bold; cursor: pointer; padding: 10px; position: absolute; left: 0; }
        .screen-title { width: 100%; text-align: center; font-size: 20px; font-weight: bold; letter-spacing: 1px; }

        .menu-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
        .menu-card { background-color: #1E1E1E; border-radius: 20px; padding: 30px 20px; text-align: center; border: 1px solid #333; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .menu-card h2 { margin: 0 0 10px 0; color: #D4AF37; font-size: 24px; }
        .menu-card p { margin: 0; color: #A0A0A0; font-size: 14px; }
        .menu-card.disabled { opacity: 0.5; cursor: not-allowed; position: relative; }
        .badge-soon { background-color: #D4AF37; color: #121212; font-size: 10px; font-weight: bold; padding: 5px 10px; border-radius: 10px; position: absolute; top: 15px; right: 15px; }

        .unit-list { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 40px; }
        .unit-item { background-color: #1E1E1E; border-radius: 15px; padding: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; cursor: pointer; }
        .unit-info h3 { margin: 0 0 5px 0; font-size: 18px; }
        .unit-info p { margin: 0; font-size: 14px; color: #A0A0A0; }
        .unit-level { background-color: #D4AF37; color: #121212; font-weight: bold; padding: 5px 12px; border-radius: 8px; font-size: 14px; }

        .flashcard-container { width: 100%; max-width: 400px; height: 50vh; perspective: 1000px; margin-top: 20px; }
        .flashcard { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
        .flashcard.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; background-color: #1E1E1E; border-radius: 20px; border: 1px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .card-back { transform: rotateY(180deg); }
        
        .word { font-size: 42px; font-weight: 800; }
        .translation { font-size: 32px; color: #D4AF37; margin-bottom: 25px; font-weight: bold; }
        .sentence { font-size: 18px; font-style: italic; color: #CCCCCC; line-height: 1.5; margin-top: 20px; }
        .sentence-back { color: #A0A0A0; }

        .controls { margin-top: 30px; display: flex; gap: 15px; width: 100%; max-width: 400px; }
        .btn { background-color: #D4AF37; color: #121212; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 15px; cursor: pointer; flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        .btn-audio { flex-grow: 0; width: 65px; font-size: 24px; }
        
        .progress-text { margin-top: 15px; color: #A0A0A0; font-size: 14px; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <div class="header">
            <div class="screen-title">Rehber Asistanı</div>
        </div>
        <div class="menu-container">
            <div class="menu-card" id="btn-open-dict">
                <h2>📖 Mesleki Sözlük</h2>
                <p>A0'dan C2'ye Ünite Bazlı Çalışma</p>
            </div>
            <div class="menu-card disabled">
                <div class="badge-soon">YAKINDA</div>
                <h2>📚 Kütüphane</h2>
                <p>Rehber El Kitapları ve Notlar</p>
            </div>
            <div class="menu-card disabled">
                <div class="badge-soon">YAKINDA</div>
                <h2>🗺️ Tur Rotaları</h2>
                <p>Antik Kentler, Hikayeler ve Görseller</p>
            </div>
        </div>
    </div>

    <div id="screen-units" class="screen">
        <div class="header">
            <button class="back-btn" onclick="showScreen('screen-home')">◄ Ana Menü</button>
            <div class="screen-title">Üniteler</div>
        </div>
        <div class="unit-list" id="unitListContainer"></div>
    </div>

    <div id="screen-cards" class="screen">
        <div class="header">
            <button class="back-btn" onclick="showScreen('screen-units')">◄ Üniteler</button>
            <div class="screen-title" id="activeUnitTitle">Ünite Adı</div>
        </div>
        
        <div class="flashcard-container" id="cardContainer">
            <div class="flashcard" id="flashcard">
                <div class="card-face card-front">
                    <div class="word" id="wordText">Loading...</div>
                    <div class="sentence" id="sentenceFront">"Loading..."</div>
                </div>
                <div class="card-face card-back">
                    <div class="translation" id="translationText">Yükleniyor...</div>
                    <div class="sentence sentence-back" id="sentenceBack">"Yükleniyor..."</div>
                </div>
            </div>
        </div>
        
        <div class="progress-text" id="progressText">Kelime: 1 / 10</div>

        <div class="controls">
            <button class="btn btn-audio" id="audioBtn">🔊</button>
            <button class="btn" id="nextBtn">Sonraki Kelime</button>
        </div>
    </div>

    <script src="words.js"></script>

    <script>
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        document.getElementById('btn-open-dict').addEventListener('click', () => {
            renderUnits();
            showScreen('screen-units');
        });

        function renderUnits() {
            const container = document.getElementById('unitListContainer');
            container.innerHTML = '';
            
            const unitMap = new Map();
            vocabulary.forEach(item => {
                if (!unitMap.has(item.unite)) {
                    unitMap.set(item.unite, { seviye: item.seviye, tema: item.tema, count: 0 });
                }
                unitMap.get(item.unite).count++;
            });

            Array.from(unitMap.keys()).sort((a,b) => a-b).forEach(uniteNum => {
                const data = unitMap.get(uniteNum);
                const div = document.createElement('div');
                div.className = 'unit-item';
                div.innerHTML = `
                    <div class="unit-info">
                        <h3>Ünite ${uniteNum}: ${data.tema}</h3>
                        <p>${data.count} Kelime</p>
                    </div>
                    <div class="unit-level">${data.seviye}</div>
                `;
                div.addEventListener('click', () => startUnit(uniteNum, data.tema));
                container.appendChild(div);
            });
        }

        let currentUnitWords = [];
        let currentIndex = 0;
        
        const flashcard = document.getElementById('flashcard');
        const cardContainer = document.getElementById('cardContainer');
        const nextBtn = document.getElementById('nextBtn');
        const audioBtn = document.getElementById('audioBtn');
        
        const wordText = document.getElementById('wordText');
        const sentenceFront = document.getElementById('sentenceFront');
        const translationText = document.getElementById('translationText');
        const sentenceBack = document.getElementById('sentenceBack');
        
        const activeUnitTitle = document.getElementById('activeUnitTitle');
        const progressText = document.getElementById('progressText');

        function startUnit(uniteNum, tema) {
            currentUnitWords = vocabulary.filter(w => w.unite === uniteNum);
            currentIndex = 0;
            activeUnitTitle.innerText = `Ünite ${uniteNum}`;
            
            if(flashcard.classList.contains('is-flipped')) {
                flashcard.classList.remove('is-flipped');
                setTimeout(() => loadCard(), 300);
            } else {
                loadCard();
            }
            showScreen('screen-cards');
        }

        function loadCard() {
            if(currentUnitWords.length === 0) return;
            const data = currentUnitWords[currentIndex];
            wordText.innerText = data.kelime;
            sentenceFront.innerText = `"${data.cumle}"`;
            translationText.innerText = data.anlam;
            sentenceBack.innerText = `"${data.cumleCeviri || 'Çeviri eklenmemiş'}"`; 
            progressText.innerText = `Kelime: ${currentIndex + 1} / ${currentUnitWords.length}`;
        }

        cardContainer.addEventListener('click', () => {
            flashcard.classList.toggle('is-flipped');
        });

        nextBtn.addEventListener('click', () => {
            if(currentUnitWords.length === 0) return;
            currentIndex++;
            if (currentIndex >= currentUnitWords.length) { currentIndex = 0; } 
            
            if (flashcard.classList.contains('is-flipped')) {
                flashcard.classList.remove('is-flipped');
                setTimeout(() => { loadCard(); }, 300);
            } else {
                 loadCard();
            }
        });

        audioBtn.addEventListener('click', () => {
            if(currentUnitWords.length === 0) return;
            const data = currentUnitWords[currentIndex];
            const utterance = new SpeechSynthesisUtterance(`${data.kelime}. ${data.cumle}`);
            utterance.lang = 'en-US'; 
            utterance.rate = 0.85; 
            window.speechSynthesis.speak(utterance);
        });
        
        // Çevrimdışı Çalışma (Service Worker) Bağlantısı
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
