<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rehber Pro v4.0</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary-blue: #3b82f6;
            --accent-gold: #f59e0b;
            --text-white: #f8fafc;
            --danger: #ef4444;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-white); 
            margin: 0; 
            font-family: 'Inter', -apple-system, sans-serif; 
            overflow: hidden;
            background-image: radial-gradient(circle at top right, #1e3a8a, transparent);
        }

        /* ANA EKRAN */
        #ana-ekran { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; gap: 20px; padding: 0 30px; }
        .ana-btn { 
            width: 100%; max-width: 320px; padding: 20px; background: var(--card-bg); 
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); 
            color: white; font-weight: 600; border-radius: 20px; text-align: center; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); transition: 0.3s;
        }

        /* ARAMA MOTORU */
        .search-container { padding: 0 20px; margin-top: 10px; }
        .search-input {
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(59, 130, 246, 0.3);
            background: rgba(30, 41, 59, 0.5); color: white; font-size: 16px; outline: none;
        }

        /* ÜNİTE LİSTESİ */
        #unite-listesi { display: none; padding: 20px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .unite-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 15px; padding-bottom: 40px; }
        .unite-btn { 
            background: linear-gradient(135deg, #1e293b, #0f172a); padding: 18px; 
            border-radius: 15px; border: 1px solid rgba(59, 130, 246, 0.2); color: white; font-weight: 600;
        }
        .fav-unite-btn { border-color: var(--accent-gold); color: var(--accent-gold); }

        /* KART EKRANI */
        #kart-ekranı { display: none; padding: 15px; height: 100vh; }
        
        /* İLERLEME ÇUBUĞU */
        .progress-container { width: 100%; height: 6px; background: #1e293b; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary-blue); width: 0%; transition: 0.4s; }

        .kart-merkez { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 75vh; }
        .card-container { perspective: 1200px; width: 100%; max-width: 360px; height: 420px; }
        .card { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            border-radius: 30px; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; padding: 30px; text-align: center; box-sizing: border-box; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card-front { background: linear-gradient(145deg, #1e293b, #0f172a); }
        .card-back { background: linear-gradient(145deg, #1e3a8a, #172554); transform: rotateY(180deg); }

        .eng-word { color: var(--primary-blue); font-size: 28px; font-weight: 800; }
        .eng-sentence { color: #94a3b8; font-size: 16px; margin-top: 15px; font-style: italic; }

        /* KONTROLLER */
        .kontrol-row { display: flex; gap: 15px; margin-top: 20px; }
        .icon-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 12px 20px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600;
        }
        .icon-btn.active { color: var(--accent-gold); border-color: var(--accent-gold); }

        .nav-kontrol { display: flex; justify-content: space-between; width: 100%; max-width: 360px; margin-top: 30px; }
        .nav-btn { background: rgba(30, 41, 59, 0.8); color: white; border: 1px solid #334155; padding: 15px 25px; border-radius: 12px; font-weight: bold; }
        .back-btn { padding: 10px 20px; background: rgba(231, 76, 60, 0.1); color: #ef4444; border: 1px solid #ef4444; border-radius: 10px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ana-ekran">
        <div style="text-align: center; margin-bottom: 10px;">
            <div style="font-size: 45px;">🛡️</div>
            <h1 style="letter-spacing: 2px; margin: 5px 0;">REHBER PRO</h1>
            <p style="color: #64748b; font-size: 13px;">Geleceğin Rehberleri İçin</p>
        </div>
        <div class="ana-btn" onclick="ekran('unite-listesi')">Manevi Sözlük</div>
        <div class="ana-btn" onclick="ekran('kutuphane')">Akademik Kitaplık</div>
        <div class="ana-btn" onclick="ekran('rotalar')">Dijital Rotalar</div>
    </div>

    <div id="unite-listesi">
        <button class="back-btn" onclick="ekran('ana-ekran')">← Ana Menü</button>
        <div class="search-container">
            <input type="text" class="search-input" id="searchBox" placeholder="Ünite veya Tema Ara..." oninput="uniteleriFiltrele()">
        </div>
        <div id="unite-grid" class="unite-grid"></div>
    </div>

    <div id="kart-ekranı">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button class="back-btn" onclick="ekran('unite-listesi')">← Çıkış</button>
            <div id="sayac" style="color: #64748b; font-weight: bold;"></div>
        </div>
        
        <div class="progress-container"><div id="pBar" class="progress-bar"></div></div>
        
        <div class="kart-merkez">
            <div id="kart-alani"></div>
            
            <div class="kontrol-row">
                <button class="icon-btn" id="siriBtn"><span>🔊</span> Okut</button>
                <button class="icon-btn" id="favBtn" onclick="favoriToggle()"><span>⭐</span> Favori</button>
            </div>

            <div class="nav-kontrol">
                <button class="nav-btn" id="prevBtn" onclick="oncekiKart()">GERİ</button>
                <button class="nav-btn" id="nextBtn" onclick="sonrakiKart()">İLERİ</button>
            </div>
        </div>
    </div>

    <div id="kutuphane" style="display:none; padding:40px; text-align:center;">
        <button class="back-btn" onclick="ekran('ana-ekran')">← Geri</button>
        <h2 style="margin-top:50px;">Akademik Kitaplık</h2>
        <a href="pdfs/anadolu-uygarliklari.pdf" target="_blank" class="ana-btn" style="display:block; margin:20px auto;">🏺 Anadolu Uygarlıkları.pdf</a>
    </div>

    <div id="rotalar" style="display:none; padding:40px; text-align:center;">
        <button class="back-btn" onclick="ekran('ana-ekran')">← Geri</button>
        <div style="margin-top:100px; opacity:0.5;"><h3>Rotalar Yakında... [cite: 2026-02-21]</h3></div>
    </div>

    <script src="words.js"></script>
    <script>
        let mevcutListe = [];
        let mevcutIndeks = 0;
        let favoriler = JSON.parse(localStorage.getItem('rehber_favs')) || [];

        function ekran(id) {
            ['ana-ekran', 'unite-listesi', 'kart-ekranı', 'kutuphane', 'rotalar'].forEach(div => {
                document.getElementById(div).style.display = (div === id) ? 'block' : 'none';
            });
            if(id === 'ana-ekran') document.getElementById('ana-ekran').style.display = 'flex';
        }

        function uniteleriBas(filtre = "") {
            const grid = document.getElementById('unite-grid');
            grid.innerHTML = "";
            if (typeof vocabulary === 'undefined') return;

            // Favoriler Butonu
            if (favoriler.length > 0) {
                const fBtn = document.createElement('button');
                fBtn.className = 'unite-btn fav-unite-btn';
                fBtn.innerText = `⭐ Favori Kelimelerim (${favoriler.length})`;
                fBtn.onclick = () => { mevcutListe = favoriler; mevcutIndeks = 0; kartGoster(); ekran('kart-ekranı'); };
                grid.appendChild(fBtn);
            }

            const uniteler = [...new Set(vocabulary.map(v => v.unite))];
            uniteler.forEach(u => {
                const data = vocabulary.find(v => v.unite === u);
                if (data.tema.toLowerCase().includes(filtre.toLowerCase()) || u.toString().includes(filtre)) {
                    const b = document.createElement('button');
                    b.className = 'unite-btn';
                    b.innerText = `Ünite ${u}: ${data.tema}`;
                    b.onclick = () => { mevcutListe = vocabulary.filter(v => v.unite === u); mevcutIndeks = 0; kartGoster(); ekran('kart-ekranı'); };
                    grid.appendChild(b);
                }
            });
        }

        function uniteleriFiltrele() { uniteleriBas(document.getElementById('searchBox').value); }

        function kartGoster() {
            const alan = document.getElementById('kart-alani');
            const kelime = mevcutListe[mevcutIndeks];
            const isFav = favoriler.some(f => f.kelime === kelime.kelime);
            
            alan.innerHTML = `
                <div class="card-container">
                    <div class="card" onclick="this.classList.toggle('flipped')">
                        <div class="card-front">
                            <div class="eng-word">${kelime.kelime}</div>
                            <div class="eng-sentence">${kelime.cumle}</div>
                        </div>
                        <div class="card-back">
                            <div style="color:var(--accent-gold); font-size:24px; font-weight:800;">${kelime.anlam}</div>
                            <div style="color:white; font-size:16px; margin-top:20px;">${kelime.cumleCeviri}</div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('siriBtn').onclick = () => konus(`${kelime.kelime}. ${kelime.cumle}`);
            document.getElementById('favBtn').classList.toggle('active', isFav);
            document.getElementById('sayac').innerText = `${mevcutIndeks + 1} / ${mevcutListe.length}`;
            document.getElementById('pBar').style.width = `${((mevcutIndeks + 1) / mevcutListe.length) * 100}%`;
            document.getElementById('prevBtn').disabled = (mevcutIndeks === 0);
            document.getElementById('nextBtn').disabled = (mevcutIndeks === mevcutListe.length - 1);
        }

        function favoriToggle() {
            const kelime = mevcutListe[mevcutIndeks];
            const idx = favoriler.findIndex(f => f.kelime === kelime.kelime);
            if (idx > -1) favoriler.splice(idx, 1);
            else favoriler.push(kelime);
            localStorage.setItem('rehber_favs', JSON.stringify(favoriler));
            document.getElementById('favBtn').classList.toggle('active', idx === -1);
            uniteleriBas();
        }

        function sonrakiKart() { if (mevcutIndeks < mevcutListe.length - 1) { mevcutIndeks++; kartGoster(); } }
        function oncekiKart() { if (mevcutIndeks > 0) { mevcutIndeks--; kartGoster(); } }
        function konus(metin) { const ut = new SpeechSynthesisUtterance(metin); ut.lang = 'en-US'; window.speechSynthesis.speak(ut); }

        window.onload = () => { uniteleriBas(); if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js'); };
    </script>
</body>
</html>
