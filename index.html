<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rehber Asistanı</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <style>
        /* DASHBOARD TASARIMI */
        body { 
            background-color: #121212; 
            color: #ffffff; 
            margin: 0; 
            font-family: -apple-system, sans-serif; 
        }

        /* ORTADA 3 SÜTUNLU MENÜ */
        .dashboard-nav {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            padding: 15px;
            background: #1a1a1a;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #333;
        }

        .dash-item {
            background: #222;
            border: 1px solid #444;
            color: #888;
            padding: 18px 5px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .dash-item.active {
            color: #3498db;
            border-color: #3498db;
            background: #1c2835;
        }

        .page { display: none; padding: 15px; }
        .page.active { display: block; }

        /* SÖZLÜK VE ÜNİTELER */
        .u-header {
            background: linear-gradient(90deg, #2980b9, #2c3e50);
            padding: 12px;
            margin: 20px 0 10px 0;
            border-radius: 8px;
            font-weight: bold;
        }

        .word-box {
            background: #1e1e1e;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            border-left: 5px solid #3498db;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .w-en { color: #3498db; font-size: 19px; font-weight: bold; }
        .w-tr { color: #f1c40f; font-size: 16px; margin: 4px 0; }
        .w-ex { font-style: italic; color: #95a5a6; font-size: 14px; }

        /* KÜTÜPHANE */
        .pdf-box {
            background: #1e1e1e;
            color: white;
            padding: 25px;
            text-decoration: none;
            border-radius: 15px;
            text-align: center;
            border: 1px dashed #555;
            display: block;
        }
    </style>
</head>
<body>

    <nav class="dashboard-nav">
        <div class="dash-item active" onclick="nav('sozluk')" id="b-sozluk">SÖZLÜK</div>
        <div class="dash-item" onclick="nav('kutuphane')" id="b-kutuphane">KÜTÜPHANE</div>
        <div class="dash-item" onclick="nav('rotalar')" id="b-rotalar">ROTALAR</div>
    </nav>

    <main id="sozluk" class="page active">
        <div id="render-area">Yükleniyor...</div>
    </main>

    <section id="kutuphane" class="page">
        <h2 style="text-align:center;">Dijital Kitaplık</h2>
        <a href="pdfs/anadolu-uygarliklari.pdf" target="_blank" class="pdf-box">
            <span style="font-size:40px;">🏺</span><br><br>
            <strong>Anadolu Uygarlıkları Tarihi</strong>
        </a>
    </section>

    <section id="rotalar" class="page">
        <div style="text-align:center; margin-top:100px; color:#444;">
            <p style="font-size:50px;">📍</p>
            <p>Tur Rotaları Yakında Eklenecek...</p>
        </div>
    </section>

    <script src="words.js"></script>
    <script>
        function run() {
            const area = document.getElementById('render-area');
            
            // Senin words.js içindeki 'vocabulary' ismini burada kullanıyoruz!
            if (typeof vocabulary === 'undefined') {
                area.innerHTML = "<div style='color:#e74c3c; text-align:center; padding:30px;'>HATA: words.js içindeki 'vocabulary' değişkeni bulunamadı!</div>";
                return;
            }

            let html = '';
            let last = -1;
            
            vocabulary.forEach(v => {
                if (v.unite !== last) {
                    last = v.unite;
                    html += `<div class="u-header">Ünite ${v.unite}: ${v.tema}</div>`;
                }
                html += `
                    <div class="word-box">
                        <div class="w-en">${v.kelime}</div>
                        <div class="w-tr">${v.anlam}</div>
                        <div class="w-ex">${v.cumle}</div>
                        <div style="color:#666; font-size:12px; margin-top:5px;">${v.cumleCeviri}</div>
                    </div>`;
            });
            area.innerHTML = html;
        }

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.dash-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('b-' + id).classList.add('active');
            window.scrollTo(0,0);
        }

        window.onload = run;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
