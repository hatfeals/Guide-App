<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rehber Asistanı PWA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* Koyu Tema ve Sekme Düzenlemeleri */
        body { 
            background-color: #121212; /* Koyu arka plan */
            color: #ffffff; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .ana-menu { 
            display: flex; 
            justify-content: space-around; 
            background-color: #1e1e1e; 
            padding: 10px 0; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid #333;
        }
        
        .ana-menu button { 
            background-color: transparent; 
            color: #bbbbbb; 
            border: none; 
            padding: 10px; 
            font-size: 14px; 
            cursor: pointer;
        }
        
        .ana-menu button.aktif { 
            color: #3498db; 
            border-bottom: 2px solid #3498db; 
            font-weight: bold; 
        }

        .sekme-icerik { padding: 10px; }
        
        /* Kütüphane Butonları */
        .pdf-listesi { list-style: none; padding: 0; }
        .pdf-buton { 
            display: block; 
            background-color: #2c3e50; 
            color: white; 
            padding: 20px; 
            margin-bottom: 10px; 
            text-decoration: none; 
            border-radius: 12px; 
            text-align: center;
            border-left: 5px solid #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav class="ana-menu">
        <button onclick="sekmeGoster('sozluk')" id="btn-sozluk" class="aktif">📖 SÖZLÜK</button>
        <button onclick="sekmeGoster('kutuphane')" id="btn-kutuphane">📂 KÜTÜPHANE</button>
        <button onclick="sekmeGoster('rotalar')" id="btn-rotalar">📍 ROTALAR</button>
    </nav>

    <section id="sozluk" class="sekme-icerik">
        <div id="app"></div> 
    </section>

    <section id="kutuphane" class="sekme-icerik" style="display: none;">
        <h2 style="text-align:center;">Kitaplık</h2>
        <ul class="pdf-listesi">
            <li>
                <a href="pdfs/anadolu-uygarliklari.pdf" target="_blank" class="pdf-buton">
                    🏺 Anadolu Uygarlıkları Tarihi
                </a>
            </li>
        </ul>
    </section>

    <section id="rotalar" class="sekme-icerik" style="display: none;">
        <h2 style="text-align:center;">Tur Rotaları</h2>
        <p style="text-align:center; color: #888;">Yakında eklenecek...</p>
    </section>

    <script src="words.js"></script>
    <script src="app.js"></script>

    <script>
        // Sekme değiştirme fonksiyonu
        function sekmeGoster(sekmeId) {
            document.querySelectorAll('.sekme-icerik').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.ana-menu button').forEach(el => el.classList.remove('aktif'));
            document.getElementById(sekmeId).style.display = 'block';
            document.getElementById('btn-' + sekmeId).classList.add('aktif');
            
            // Eğer sözlük sekmesine dönülürse app.js'in çalışmasını tetikleyebiliriz
            if(sekmeId === 'sozluk') {
                // app.js zaten sayfa yüklendiğinde çalışıyor olacak
            }
        }

        // Service Worker Kaydı
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
