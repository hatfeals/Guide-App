<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rehber Asistanı PWA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="style.css">

    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f5f6fa; }
        .ana-menu { display: flex; justify-content: space-around; background-color: #34495e; padding: 10px 0; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .ana-menu button { background-color: transparent; color: white; border: none; padding: 10px 15px; font-size: 16px; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.3s ease; }
        .ana-menu button.aktif { border-bottom: 3px solid #3498db; font-weight: bold; color: #3498db; }
        .sekme-icerik { padding: 15px; }
        .pdf-listesi { list-style-type: none; padding: 0; margin: 0; }
        .pdf-listesi li { margin-bottom: 15px; }
        .pdf-buton { display: block; background-color: #e74c3c; color: white; padding: 18px; text-decoration: none; border-radius: 10px; font-size: 16px; font-weight: bold; text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.2); }
        .pdf-buton:active { transform: scale(0.98); background-color: #c0392b; }
    </style>
</head>
<body>

    <header style="text-align: center; padding: 20px; background-color: #2c3e50; color: white;">
        <h1 style="margin: 0; font-size: 22px;">Rehber Asistanı</h1>
        <p style="margin: 5px 0 0 0; font-size: 13px; color: #bdc3c7;">1500 Kelime & Akıllı Kütüphane</p>
    </header>

    <nav class="ana-menu">
        <button onclick="sekmeGoster('sozluk')" id="btn-sozluk" class="aktif">📖 Sözlük</button>
        <button onclick="sekmeGoster('kutuphane')" id="btn-kutuphane">📂 Kütüphane</button>
        <button onclick="sekmeGoster('rotalar')" id="btn-rotalar">📍 Rotalar</button>
    </nav>

    <section id="sozluk" class="sekme-icerik" style="display: block;">
        <div id="app"></div>
    </section>

    <section id="kutuphane" class="sekme-icerik" style="display: none;">
        <h2 style="color: #2c3e50;">📂 Çevrimdışı Kitaplık</h2>
        <p style="color: #7f8c8d; font-size: 14px; margin-bottom: 20px;">Kitabı bir kez açtığınızda telefonunuza kaydedilir ve internet yokken de çalışır.</p>
        
        <ul class="pdf-listesi">
            <li>
                <a href="pdfs/anadolu-uygarliklari.pdf" target="_blank" class="pdf-buton">
                    🏺 Anadolu Uygarlıkları Tarihi (PDF)
                </a>
            </li>
            </ul>
    </section>

    <section id="rotalar" class="sekme-icerik" style="display: none;">
        <h2 style="color: #2c3e50;">📍 Tur Rotaları</h2>
        <p style="color: #7f8c8d;">Yakında: GPS destekli Likya Yolu ve Kültür Rotaları...</p>
    </section>

    <script src="words.js"></script>
    <script src="app.js"></script>

    <script>
        function sekmeGoster(sekmeId) {
            document.querySelectorAll('.sekme-icerik').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.ana-menu button').forEach(el => el.classList.remove('aktif'));
            document.getElementById(sekmeId).style.display = 'block';
            document.getElementById('btn-' + sekmeId).classList.add('aktif');
            window.scrollTo(0,0);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Sistem Hazır!'))
                    .catch(err => console.log('Hata:', err));
            });
        }
    </script>
</body>
</html>
