<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rehber Asistanı PWA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        /* KOYU TEMA VE TASARIM */
        body { 
            background-color: #121212; 
            color: #ffffff; 
            margin: 0; 
            font-family: sans-serif; 
        }
        .ana-menu { 
            display: flex; 
            justify-content: space-around; 
            background-color: #1e1e1e; 
            padding: 10px 0; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid #333;
        }
        .ana-menu button { 
            background-color: transparent; 
            color: #888; 
            border: none; 
            padding: 10px; 
            font-size: 16px; 
            cursor: pointer;
        }
        .ana-menu button.aktif { 
            color: #3498db; 
            border-bottom: 2px solid #3498db; 
            font-weight: bold; 
        }
        .sekme-icerik { padding: 15px; }
        
        /* Ünite ve Kelime Kartları */
        .unite-baslik { 
            background-color: #2980b9; 
            padding: 15px; 
            margin-top: 20px; 
            border-radius: 8px; 
            font-size: 18px;
        }
        .kelime-kart { 
            background-color: #1e1e1e; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 8px; 
            border-left: 4px solid #3498db;
        }
        .ingilizce { color: #3498db; font-size: 18px; font-weight: bold; }
        .turkce { color: #f1c40f; font-size: 16px; }
        .ornek { font-style: italic; color: #bdc3c7; font-size: 14px; margin-top: 5px; }

        /* Kütüphane Butonları */
        .pdf-listesi { list-style: none; padding: 0; }
        .pdf-buton { 
            display: block; 
            background-color: #c0392b; 
            color: white; 
            padding: 20px; 
            margin-bottom: 10px; 
            text-decoration: none; 
            border-radius: 10px; 
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav class="ana-menu">
        <button onclick="sekmeGoster('sozluk')" id="btn-sozluk" class="aktif">📖 SÖZLÜK</button>
        <button onclick="sekmeGoster('kutuphane')" id="btn-kutuphane">📂 KÜTÜPHANE</button>
        <button onclick="sekmeGoster('rotalar')" id="btn-rotalar">📍 ROTALAR</button>
    </nav>

    <section id="sozluk" class="sekme-icerik">
        <div id="sozluk-liste"></div>
    </section>

    <section id="kutuphane" class="sekme-icerik" style="display: none;">
        <h2 style="text-align:center;">Kitaplık</h2>
        <ul class="pdf-listesi">
            <li>
                <a href="pdfs/anadolu-uygarliklari.pdf" target="_blank" class="pdf-buton">
                    🏺 Anadolu Uygarlıkları Tarihi (PDF)
                </a>
            </li>
        </ul>
    </section>

    <section id="rotalar" class="sekme-icerik" style="display: none;">
        <h2 style="text-align:center;">Tur Rotaları</h2>
        <p style="text-align:center; color: #666;">Yakında...</p>
    </section>

    <script src="words.js"></script>

    <script>
        // 1. KELİMELERİ EKRANA BASAN MOTOR (Sözlüğü geri getiren kısım burası!)
        function sozlukBas() {
            const liste = document.getElementById('sozluk-liste');
            let html = '';
            let mevcutUnite = 0;

            words.forEach(k => {
                if (k.unite !== mevcutUnite) {
                    mevcutUnite = k.unite;
                    html += `<div class="unite-baslik">Ünite ${mevcutUnite}: ${k.tema}</div>`;
                }
                html += `
                    <div class="kelime-kart">
                        <div class="ingilizce">${k.kelime}</div>
                        <div class="turkce">${k.anlam}</div>
                        <div class="ornek">${k.cumle}</div>
                        <div class="ornek" style="color:#7f8c8d">${k.cumleCeviri}</div>
                    </div>
                `;
            });
            liste.innerHTML = html;
        }

        // 2. SEKME YÖNETİMİ
        function sekmeGoster(sekmeId) {
            document.querySelectorAll('.sekme-icerik').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.ana-menu button').forEach(el => el.classList.remove('aktif'));
            document.getElementById(sekmeId).style.display = 'block';
            document.getElementById('btn-' + sekmeId).classList.add('aktif');
            window.scrollTo(0,0);
        }

        // Sayfa açıldığında sözlüğü bas
        window.onload = sozlukBas;

        // Service Worker Kaydı
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
