<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rehber Asistanı PWA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        /* TAM KOYU TEMA TASARIMI */
        body { 
            background-color: #121212; 
            color: #ffffff; 
            margin: 0; 
            font-family: -apple-system, system-ui, sans-serif; 
        }
        
        /* Sekme Menüsü */
        .ana-menu { 
            display: flex; 
            justify-content: space-around; 
            background-color: #1e1e1e; 
            padding: 10px 0; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid #333;
        }

        .ana-menu button { 
            background-color: transparent; 
            color: #888; 
            border: none; 
            padding: 10px; 
            font-size: 15px; 
            cursor: pointer;
        }

        .ana-menu button.aktif { 
            color: #3498db; 
            border-bottom: 2px solid #3498db; 
            font-weight: bold; 
        }

        .sekme-icerik { padding: 15px; }

        /* SÖZLÜK KARTLARI */
        .unite-baslik { 
            background: linear-gradient(90deg, #2980b9, #2c3e50);
            padding: 15px; 
            margin: 25px 0 10px 0; 
            border-radius: 10px; 
            font-weight: bold;
            font-size: 18px;
        }

        .kelime-kart { 
            background-color: #1e1e1e; 
            padding: 15px; 
            margin: 12px 0; 
            border-radius: 12px; 
            border-left: 5px solid #3498db;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .ingilizce { color: #3498db; font-size: 19px; font-weight: bold; margin-bottom: 4px; }
        .turkce { color: #f1c40f; font-size: 16px; margin-bottom: 8px; font-weight: 500; }
        .ornek { font-style: italic; color: #bdc3c7; font-size: 14px; line-height: 1.4; }
        .ceviri { color: #7f8c8d; font-size: 13px; margin-top: 4px; }

        /* KÜTÜPHANE */
        .pdf-listesi { list-style: none; padding: 0; }
        .pdf-buton { 
            display: block; 
            background: #c0392b; 
            color: white; 
            padding: 20px; 
            margin-bottom: 15px; 
            text-decoration: none; 
            border-radius: 12px; 
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav class="ana-menu">
        <button onclick="sekmeGoster('sozluk')" id="btn-sozluk" class="aktif">📖 SÖZLÜK</button>
        <button onclick="sekmeGoster('kutuphane')" id="btn-kutuphane">📂 KÜTÜPHANE</button>
        <button onclick="sekmeGoster('rotalar')" id="btn-rotalar">📍 ROTALAR</button>
    </nav>

    <section id="sozluk" class="sekme-icerik">
        <div id="sozluk-liste"></div>
    </section>

    <section id="kutuphane" class="sekme-icerik" style="display: none;">
        <h2 style="text-align:center;">Kitaplık</h2>
        <ul class="pdf-listesi">
            <li>
                <a href="pdfs/anadolu-uygarliklari.pdf" target="_blank" class="pdf-buton">
                    🏺 Anadolu Uygarlıkları Tarihi (PDF)
                </a>
            </li>
        </ul>
    </section>

    <section id="rotalar" class="sekme-icerik" style="display: none;">
        <h2 style="text-align:center; color: #444;">📍 Tur Rotaları</h2>
        <p style="text-align:center; color: #666; margin-top: 50px;">Yakında eklenecek...</p>
    </section>

    <script src="words.js"></script>

    <script>
        // KELİMELERİ EKRANA BASAN MOTOR
        function sozlukOlustur() {
            const container = document.getElementById('sozluk-liste');
            if (typeof words === 'undefined') {
                container.innerHTML = "<p style='color:red; text-align:center;'>Hata: words.js bulunamadı!</p>";
                return;
            }

            let html = '';
            let sonUnite = -1;

            words.forEach(k => {
                if (k.unite !== sonUnite) {
                    sonUnite = k.unite;
                    html += `<div class="unite-baslik">Ünite ${k.unite}: ${k.tema}</div>`;
                }
                html += `
                    <div class="kelime-kart">
                        <div class="ingilizce">${k.kelime}</div>
                        <div class="turkce">${k.anlam}</div>
                        <div class="ornek">${k.cumle}</div>
                        <div class="ceviri">${k.cumleCeviri}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // SEKME GEÇİŞİ
        function sekmeGoster(id) {
            document.querySelectorAll('.sekme-icerik').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.ana-menu button').forEach(b => b.classList.remove('aktif'));
            document.getElementById(id).style.display = 'block';
            document.getElementById('btn-' + id).classList.add('aktif');
            window.scrollTo(0,0);
        }

        // BAŞLAT
        window.onload = sozlukOlustur;

        // SERVICE WORKER KAYDI
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
