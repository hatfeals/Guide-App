<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guide-app</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            --bg-color: #000000; /* İstediğin Saf Siyah */
            --card-bg: #111111;
            --primary-blue: #3b82f6;
            --accent-gold: #f59e0b;
            --text-white: #ffffff;
            --danger: #ef4444;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-white); 
            margin: 0; 
            font-family: 'Inter', -apple-system, sans-serif; 
            overflow: hidden;
        }

        /* ANA EKRAN */
        #ana-ekran { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; gap: 20px; padding: 0 30px; }
        
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-area h1 { letter-spacing: 4px; font-size: 32px; margin: 10px 0; font-weight: 900; }

        .ana-btn { 
            width: 100%; max-width: 320px; padding: 22px; background: #111111; 
            border: 1px solid #333; color: white; font-weight: 700; border-radius: 15px; 
            text-align: center; cursor: pointer; transition: 0.3s; font-size: 16px;
        }
        .ana-btn:active { background: #222; transform: scale(0.98); }

        /* ÜNİTE LİSTESİ */
        #unite-listesi { display: none; padding: 20px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .search-container { padding: 10px 0; position: sticky; top: 0; background: var(--bg-color); z-index: 10; }
        .search-input {
            width: 100%; padding: 18px; border-radius: 12px; border: 1px solid #333;
            background: #111; color: white; font-size: 16px; outline: none;
        }

        .unite-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 15px; padding-bottom: 40px; }
        .unite-btn { 
            background: #111; padding: 20px; border-radius: 12px; 
            border: 1px solid #333; color: white; font-weight: 600; text-align: left;
        }
        .fav-unite-btn { border-color: var(--accent-gold); color: var(--accent-gold); }

        /* KART EKRANI - DEV KARTLAR */
        #kart-ekranı { display: none; padding: 15px; height: 100vh; }
        .progress-container { width: 100%; height: 4px; background: #222; border-radius: 2px; margin: 10px 0; }
        .progress-bar { height: 100%; background: var(--primary-blue); width: 0%; transition: 0.3s; }

        .kart-merkez { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        
        /* Kart Boyutu Büyütüldü */
        .card-container { perspective: 1500px; width: 95%; max-width: 450px; height: 500px; }
        .card { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); }
        
        .card-front, .card-back { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            border-radius: 40px; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; padding: 40px; text-align: center; box-sizing: border-box; 
            border: 1px solid #333;
        }
        .card-front { background: #111; }
        .card-back { background: #0a0a0a; transform: rotateY(180deg); border-color: var(--accent-gold); }

        .eng-word { color: var(--primary-blue); font-size: 36px; font-weight: 900; }
        .eng-sentence { color: #888; font-size: 20px; margin-top: 20px; line-height: 1.5; font-style: italic; }
        .tr-word { color: var(--accent-gold); font-size: 32px; font-weight: 900; }
        .tr-sentence { color: #eee; font-size: 20px; margin-top: 20px; line-height: 1.5; }

        /* KONTROLLER */
        .kontrol-row { display: flex; gap: 20px; margin-top: 25px; }
        .icon-btn { 
            background: #111; border: 1px solid #333; color: white; padding: 15px 25px; 
            border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: bold;
        }
        .icon-btn.active { border-color: var(--accent-gold); color: var(--accent-gold); }

        .nav-kontrol { display: flex; justify-content: space-between; width: 100%; max-width: 450px; margin-top: 30px; }
        .nav-btn { background: #111; color: white; border: 1px solid #333; padding: 20px 35px; border-radius: 15px; font-weight: 900; }
        .nav-btn:disabled { opacity: 0.2; }

        .back-btn { padding: 12px 20px; background: transparent; color: #ef4444; border: 1px solid #ef4444; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ana-ekran">
        <div class="logo-area">
            <div style="font-size: 60px;">🌍</div>
            <h1>GUIDE-APP</h1>
            <p style="color: #444; font-weight: bold; letter-spacing: 2px;">TOURISM VOCABULARY</p>
        </div>
        <div class="ana-btn" onclick="ekran('unite-listesi')">Sözlük</div>
        <div class="ana-btn" onclick="ekran('kutuphane')">Kitaplık</div>
        <div class="ana-btn" onclick="ekran('rotalar')">Rotalar</div>
    </div>

    <div id="unite-listesi">
        <button class="back-btn" onclick="ekran('ana-ekran')">← ANA MENÜ</button>
        <div class="search-container">
            <input type="text" class="search-input" id="searchBox" placeholder="Kelime veya Ünite Ara..." oninput="uniteleriFiltrele()">
        </div>
        <div id="unite-grid" class="unite-grid"></div>
    </div>

    <div id="kart-ekranı">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button class="back-btn" onclick="ekran('unite-listesi')">← ÜNİTELER</button>
            <div id="sayac" style="color: #444; font-weight: 900;"></div>
        </div>
        <div class="progress-container"><div id="pBar" class="progress-bar"></div></div>
        <div class="kart-merkez">
            <div id="kart-alani"></div>
            <div class="kontrol-row">
                <button class="icon-btn" id="siriBtn">🔊 OKUT</button>
                <button class="icon-btn" id="favBtn" onclick="favoriToggle()">⭐ FAVORİ</button>
            </div>
            <div class="nav-kontrol">
                <button class="nav-btn" id="prevBtn" onclick="oncekiKart()">GERİ</button>
                <button class="nav-btn" id="nextBtn" onclick="sonrakiKart()">İLERİ</button>
            </div>
        </div>
    </div>

    <div id="kutuphane" style="display:none; padding:40px; text-align:center;">
        <button class="back-btn" onclick="ekran('ana-ekran')">← GERİ</button>
        <h2 style="margin-top:50px;">DİJİTAL KİTAPLIK</h2>
        <a href="pdfs/anadolu-uygarliklari.pdf" target="_blank" class="ana-btn" style="display:block; margin:40px auto; border-style: dashed;">🏺 Anadolu Uygarlıkları.pdf</a>
    </div>

    <div id="rotalar" style="display:none; padding:40px; text-align:center;">
        <button class="back-btn" onclick="ekran('ana-ekran')">← GERİ</button>
        <div style="margin-top:100px; opacity:0.3;">
            <div style="font-size: 80px;">📍</div>
            <h2>YAKINDA...</h2>
        </div>
    </div>

    <script src="words.js"></script>
    <script>
        let mevcutListe = [];
        let mevcutIndeks = 0;
        let favoriler = JSON.parse(localStorage.getItem('guide_favs')) || [];

        function ekran(id) {
            ['ana-ekran', 'unite-listesi', 'kart-ekranı', 'kutuphane', 'rotalar'].forEach(div => {
                document.getElementById(div).style.display = (div === id) ? 'block' : 'none';
            });
            if(id === 'ana-ekran') document.getElementById('ana-ekran').style.display = 'flex';
        }

        function uniteleriBas(filtre = "") {
            const grid = document.getElementById('unite-grid');
            grid.innerHTML = "";
            if (typeof vocabulary === 'undefined') return;

            if (favoriler.length > 0 && filtre === "") {
                const fBtn = document.createElement('button');
                fBtn.className = 'unite-btn fav-unite-btn';
                fBtn.innerHTML = `⭐ Favori Kelimelerim (${favoriler.length})`;
                fBtn.onclick = () => { mevcutListe = favoriler; mevcutIndeks = 0; kartGoster(); ekran('kart-ekranı'); };
                grid.appendChild(fBtn);
            }

            const uniteler = [...new Set(vocabulary.map(v => v.unite))];
            uniteler.forEach(u => {
                const data = vocabulary.find(v => v.unite === u);
                if (data.tema.toLowerCase().includes(filtre.toLowerCase()) || u.toString().includes(filtre)) {
                    const b = document.createElement('button');
                    b.className = 'unite-btn';
                    b.innerText = `Ünite ${u}: ${data.tema}`;
                    b.onclick = () => { mevcutListe = vocabulary.filter(v => v.unite === u); mevcutIndeks = 0; kartGoster(); ekran('kart-ekranı'); };
                    grid.appendChild(b);
                }
            });
        }

        function uniteleriFiltrele() { uniteleriBas(document.getElementById('searchBox').value); }

        function kartGoster() {
            const alan = document.getElementById('kart-alani');
            const k = mevcutListe[mevcutIndeks];
            const isFav = favoriler.some(f => f.kelime === k.kelime);
            
            alan.innerHTML = `
                <div class="card-container">
                    <div class="card" onclick="this.classList.toggle('flipped')">
                        <div class="card-front">
                            <div class="eng-word">${k.kelime}</div>
                            <div class="eng-sentence">${k.cumle}</div>
                        </div>
                        <div class="card-back">
                            <div class="tr-word">${k.anlam}</div>
                            <div class="tr-sentence">${k.cumleCeviri}</div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('siriBtn').onclick = () => konus(`${k.kelime}. ${k.cumle}`);
            document.getElementById('favBtn').classList.toggle('active', isFav);
            document.getElementById('sayac').innerText = `${mevcutIndeks + 1} / ${mevcutListe.length}`;
            document.getElementById('pBar').style.width = `${((mevcutIndeks + 1) / mevcutListe.length) * 100}%`;
            document.getElementById('prevBtn').disabled = (mevcutIndeks === 0);
            document.getElementById('nextBtn').disabled = (mevcutIndeks === mevcutListe.length - 1);
        }

        function favoriToggle() {
            const k = mevcutListe[mevcutIndeks];
            const idx = favoriler.findIndex(f => f.kelime === k.kelime);
            if (idx > -1) favoriler.splice(idx, 1);
            else favoriler.push(k);
            localStorage.setItem('guide_favs', JSON.stringify(favoriler));
            document.getElementById('favBtn').classList.toggle('active', idx === -1);
            uniteleriBas();
        }

        function sonrakiKart() { if (mevcutIndeks < mevcutListe.length - 1) { mevcutIndeks++; kartGoster(); } }
        function oncekiKart() { if (mevcutIndeks > 0) { mevcutIndeks--; kartGoster(); } }
        function konus(m) { const ut = new SpeechSynthesisUtterance(m); ut.lang = 'en-US'; window.speechSynthesis.speak(ut); }

        window.onload = () => { uniteleriBas(); if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js'); };
    </script>
</body>
</html>
