<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rehber Asistanı</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <style>
        /* ANA KOYU TEMA */
        body { 
            background-color: #121212; 
            color: #ffffff; 
            margin: 0; 
            font-family: -apple-system, sans-serif; 
        }

        header {
            text-align: center;
            padding: 30px 10px;
            background: #1a1a1a;
        }

        /* İSTEDİĞİN 3 SÜTUNLU ANA PANEL */
        .ana-panel {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .panel-butonu {
            background: #1e1e1e;
            border: 2px solid #333;
            padding: 20px 5px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            color: #888;
            font-weight: bold;
            font-size: 13px;
        }

        .panel-butonu.aktif {
            border-color: #3498db;
            color: #3498db;
            background: #1a2633;
        }

        /* İÇERİK ALANLARI */
        .icerik-alani { display: none; padding: 20px; }
        .icerik-alani.aktif { display: block; }

        /* SÖZLÜK TASARIMI (ESKİ STİL) */
        .unite-kart {
            background: linear-gradient(90deg, #2980b9, #2c3e50);
            padding: 15px;
            margin: 25px 0 10px 0;
            border-radius: 10px;
            font-weight: bold;
        }

        .kelime-kutusu {
            background: #1e1e1e;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            border-left: 5px solid #3498db;
        }

        .en { color: #3498db; font-size: 19px; font-weight: bold; }
        .tr { color: #f1c40f; font-size: 16px; margin: 4px 0; }
        .ex { font-style: italic; color: #95a5a6; font-size: 14px; }

        /* KÜTÜPHANE */
        .pdf-link {
            display: block;
            background: #1e1e1e;
            color: white;
            padding: 25px;
            text-decoration: none;
            border-radius: 15px;
            text-align: center;
            border: 2px dashed #444;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Rehber Asistanı</h1>
        <p style="color: #666;">Mesleki Sözlük & Kütüphane</p>
    </header>

    <nav class="ana-panel">
        <div class="panel-butonu aktif" onclick="goster('sozluk')" id="b-sozluk">SÖZLÜK</div>
        <div class="panel-butonu" onclick="goster('kutuphane')" id="b-kutuphane">KÜTÜPHANE</div>
        <div class="panel-butonu" onclick="goster('rotalar')" id="b-rotalar">ROTALAR</div>
    </nav>

    <main id="sozluk" class="icerik-alani aktif">
        <div id="sozluk-ici">Yükleniyor...</div>
    </main>

    <section id="kutuphane" class="icerik-alani">
        <h2 style="text-align:center;">Kitaplık</h2>
        <a href="pdfs/anadolu-uygarliklari.pdf" target="_blank" class="pdf-link">
            <span style="font-size:40px;">🏺</span><br><br>
            Anadolu Uygarlıkları Tarihi (PDF)
        </a>
    </section>

    <section id="rotalar" class="icerik-alani">
        <div style="text-align:center; margin-top:80px; color:#444;">
            <p style="font-size:50px;">📍</p>
            <p>Yakında Eklenecek...</p>
        </div>
    </section>

    <script src="words.js"></script>
    <script>
        function sozlukKur() {
            const hedef = document.getElementById('sozluk-ici');
            
            // DEĞİŞKEN ADI VOCABULARY OLARAK DÜZELTİLDİ
            if (typeof vocabulary === 'undefined') {
                hedef.innerHTML = "<div style='color:red; text-align:center;'>HATA: words.js içindeki 'vocabulary' bulunamadı!</div>";
                return;
            }

            let html = '';
            let sonU = -1;
            
            vocabulary.forEach(v => {
                if (v.unite !== sonU) {
                    sonU = v.unite;
                    html += `<div class="unite-kart">Ünite ${v.unite}: ${v.tema}</div>`;
                }
                html += `
                    <div class="kelime-kutusu">
                        <div class="en">${v.kelime}</div>
                        <div class="tr">${v.anlam}</div>
                        <div class="ex">${v.cumle}</div>
                        <div style="color:#555; font-size:12px; margin-top:5px;">${v.cumleCeviri}</div>
                    </div>`;
            });
            hedef.innerHTML = html;
        }

        function goster(id) {
            document.querySelectorAll('.icerik-alani').forEach(a => a.classList.remove('aktif'));
            document.querySelectorAll('.panel-butonu').forEach(b => b.classList.remove('aktif'));
            document.getElementById(id).classList.add('aktif');
            document.getElementById('b-' + id).classList.add('aktif');
            window.scrollTo(0,0);
        }

        window.onload = sozlukKur;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
